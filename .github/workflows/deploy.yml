name: Deploy Static Website to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # Upload CSS, JS, images — long cache (1 year), immutable
      - name: Upload static assets to S3
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json" \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "terraform/*"

      # Upload HTML and JSON — no cache (always fresh)
      - name: Upload HTML and JSON to S3
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET }} \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "*" \
            --include "*.html" \
            --include "*.json"

      # Bust the CloudFront edge cache so users see the new version immediately
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Deployment confirmation
        run: |
          echo "Deployment completed successfully"
          echo "Timestamp : $(date -u)"
          echo "Branch    : ${{ github.ref_name }}"
          echo "Commit    : ${{ github.sha }}"
          echo "URL       : https://$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Id=='${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}'].DomainName" \
            --output text)"
